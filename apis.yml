description: >-
  ANN Inc. is the former parent company of Ann Taylor and LOFT, specialty
  retailers of women's apparel, shoes, and accessories. ANN Inc. was acquired
  by Ascena Retail Group in 2015 and subsequently sold to Sycamore Partners in
  December 2020 for $540 million, alongside Lane Bryant and Lou & Grey brands.
  The brands now operate under KnitWell Group (formerly Premium Apparel LLC),
  a Sycamore Partners holding company that also owns Talbots. Ann Taylor and
  LOFT offer affiliate programs for digital publishers.
